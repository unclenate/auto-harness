id: api-service
type: architecture
version: 1.0.0
stability: beta
summary: API service overlay for request handlers, contracts, service boundaries, and backend topology records.
dependsOn:
  - kernel/base
conflictsWith: []
requiredArtifacts:
  - docs/architecture/overview.md
optionalArtifacts: []
sensitivePaths:
  - description: API entrypoints and service handlers
    patterns:
      - ^api/
      - ^src/api/
      - ^src/handlers/
      - ^src/services/
      - ^cmd/
companionRules:
  - description: API boundary changes require architecture documentation or an ADR
    triggerPaths:
      - ^api/
      - ^src/api/
      - ^src/handlers/
      - ^src/services/
      - ^cmd/
    requiredAny:
      - ^docs/architecture/overview\.md$
      - ^docs/adr/ADR-
      - ^docs/requirements/PRD-
    humanReview: Reviewers verify API contract or service-boundary changes are recorded at the correct level.
validators:
  - validate-required-artifacts
  - validate-companions
reviewGates:
  - Human review is required for externally visible API contract changes.
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/profiles/architectures/api-service/README.md
