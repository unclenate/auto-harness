id: node-typescript
type: stack
version: 1.0.0
summary: Node.js and TypeScript overlay for runtime pinning, package governance, CI expectations, and tool permissions.
dependsOn:
  - kernel/base
conflictsWith: []
requiredArtifacts: []
optionalArtifacts:
  - .nvmrc
  - package.json
  - tsconfig.json
  - .github/workflows/stack.yml
sensitivePaths:
  - description: Node and TypeScript runtime or dependency configuration
    patterns:
      - ^package\.json$
      - ^package-lock\.json$
      - ^pnpm-lock\.yaml$
      - ^yarn\.lock$
      - ^tsconfig\.
      - ^\.nvmrc$
companionRules:
  - description: Major dependency or runtime changes require architecture or decision context
    triggerPaths:
      - ^package\.json$
      - ^package-lock\.json$
      - ^pnpm-lock\.yaml$
      - ^yarn\.lock$
      - ^\.nvmrc$
      - ^tsconfig\.
    requiredAny:
      - ^docs/adr/ADR-
      - ^docs/architecture/overview\.md$
      - ^docs/requirements/PRD-
    humanReview: Reviewers verify that supply-chain and runtime impacts are explained, not just recorded.
validators:
  - validate-module-graph
  - validate-companions
reviewGates:
  - Dependency installation remains a Tier 4 action and must be human-directed.
agentAdapters:
  - platform/agents/claude-code
compiledFragments:
  - platform/profiles/stacks/node-typescript/README.md
recommendedSkills:
  # --- Agent Skills format (SKILL.md directories) ---
  - harness-governance   # trust tiers and companion rules (source: platform/skills/)

  # --- OpenClaw / ClawHub ecosystem (clawhub install <slug>) ---
  - next-best-practices     # Next.js file conventions, RSC boundaries, data patterns (curated list)
  - next-cache-components   # Next.js 16 PPR, use cache, cacheLife, cacheTag (curated list)
  - lb-vercel-skill         # Vercel CLI — deployments, env vars, domains (curated list)
  - react-perf              # React and Next.js performance optimization (curated list)
  - supabase                # Supabase database ops (curated list; install when using Supabase)
