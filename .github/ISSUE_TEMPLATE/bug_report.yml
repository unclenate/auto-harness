name: Bug Report
description: Report a bug, validator failure, or other unexpected behavior in auto-harness.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. To help us reproduce quickly, please fill in as much of the form below as you can. If a field does not apply, leave it blank.

        Before submitting, please check that this is not a security concern. Security issues should be reported privately — see [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
      placeholder: "When I ran validate-companions.sh, it failed with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected the validator to exit 0 because the change-log entry was present."
    validations:
      required: true

  - type: input
    id: validator
    attributes:
      label: Validator or workflow involved
      description: Which validator script, workflow document, or skill is the bug in?
      placeholder: "platform/validators/validate-companions.sh"

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal sequence we can follow to see the bug ourselves.
      placeholder: |
        1. Clone auto-harness at commit `<sha>`
        2. Run `bash platform/validators/validate-companions.sh harness.manifest.yaml . main`
        3. Observe error message: `...`
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit hash or tag
      description: The commit or tag where the bug was observed.
      placeholder: "ede1e0d or v0.1.0-alpha"

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Bash version (`bash --version`), Ruby version (`ruby --version`), ripgrep version (`rg --version`).
      placeholder: "macOS 14.5 / Bash 5.2 / Ruby 3.3.0 / ripgrep 14.1.0"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or validator output
      description: Paste any error output. Code fences are fine.
      render: shell

  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I ran the full validator chain locally and confirmed the failure is reproducible.
          required: false
        - label: This is not a security issue. (Security issues go to nate@bdits.io per SECURITY.md.)
          required: true
