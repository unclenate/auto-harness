id: healthcare-smart-on-fhir
type: domain
version: 1.0.0
stability: beta
summary: SMART-on-FHIR app-launch and OAuth-scope domain overlay — models provider-launch and patient-access trust roles as a documented axis on top of the FHIR data layer.
dependsOn:
  - kernel/base
  - healthcare-fhir
conflictsWith: []
requiredArtifacts:
  - docs/healthcare/smart-scope-map.md
optionalArtifacts: []
sensitivePaths:
  - description: SMART app launch, OAuth scope, and token-handling surfaces
    patterns:
      - ^src/FHIR/SMART/
      - ^auth/
      - scope
      - launch
      - token
      - oauth
companionRules:
  - description: Changes to docs/healthcare/smart-scope-map.md require an ADR under docs/adr/ or a docs/project/change-log.md entry
    triggerPaths:
      - ^docs/healthcare/smart-scope-map\.md$
    requiredAny:
      - ^docs/adr/ADR-
      - ^docs/project/change-log\.md$
    humanReview: Reviewers confirm scope grants and launch-context changes are intentional.
  - description: SMART implementation and auth-surface changes (src/FHIR/SMART/, auth/) require a docs/security/risk-register.md update or an ADR under docs/adr/ — these paths implement the scope, launch, and token handling that governs the patient-access trust boundary, where the patient is the resource owner
    triggerPaths:
      - ^src/FHIR/SMART/
      - ^auth/
      - launch
      - token
      - oauth
    requiredAny:
      - ^docs/security/risk-register\.md$
      - ^docs/adr/ADR-
    humanReview: Reviewers verify the provider-launch vs patient-access scope boundary is preserved.
validators:
  - validate-companions
reviewGates:
  - Human review is required for scope grants, launch-context changes, and any provider-to-patient scope-boundary edit.
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/profiles/domains/healthcare-smart-on-fhir/README.md
recommendedSkills:
  - harness-governance   # trust tiers and companion rules (source: platform/skills/)
