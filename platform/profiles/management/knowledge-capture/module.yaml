id: knowledge-capture
type: management
version: 1.2.0
stability: stable
summary: "Shared knowledge capture module. Provides docs/knowledge/ as a durable, reviewable, project-level surface where agent and human observations accumulate and are surfaced for promotion into operating-principles. v1.2.0 sunsets docs/knowledge/distilled-learnings.md (ADR-0014, PRD-0011): the file is no longer a required artifact, its audit-trail rule is removed, and the cycle-end distillation satisfier set shrinks from three destinations to two (shared-observations.md, operating-principles.md). Rationale: 40 days of zero inbound flow, operating-principles absorbed the curated-synthesis charter in practice (§§ 7-8), and operating-principle § 7 argues against two destinations whose change-classes have collapsed. v1.1.0 added the cycle-end distillation-trigger companion rule (PRD-0004): distillation-worthy work (new ADR, new OPP, OPP proposed flip, new module manifest, harness manifest change) requires a paired entry in at least one knowledge destination."
tier:
  declared: 2
dependsOn:
  - kernel/base
  - project-standard
conflictsWith: []
requiredArtifacts:
  - docs/knowledge/README.md
  - docs/knowledge/shared-observations.md
optionalArtifacts: []
sensitivePaths:
  - description: "Knowledge capture policies — the foundational Observation Structure choice, write policy, cadences, and escalation table"
    patterns:
      - "^docs/knowledge/README\\.md$"
companionRules:
  - description: "Shared observation additions must be accompanied by a pointer in that day's daily memory log. Establishes the audit trail floor for all observations regardless of severity. Higher-severity observations ALSO trigger additional companion rules declared by other modules (revision tracker, ADR, risk register) via the escalation table in the project's knowledge README."
    triggerPaths:
      - "^docs/knowledge/shared-observations\\.md$"
    requiredAny:
      - "^memory/\\d{4}-\\d{2}-\\d{2}\\.md$"
      - "^docs/project/change-log\\.md$"
    humanReview: "Reviewers verify the observation has an audit trail entry and that severity-driven escalations (if any) have been applied per the knowledge README's escalation table."
  - description: "Changes to the foundational Observation Structure choice require an ADR. This is the governance floor for any change to how knowledge is captured project-wide."
    triggerPaths:
      - "^docs/knowledge/README\\.md$"
    requiredAny:
      - "^docs/adr/ADR-"
    humanReview: "Reviewers verify the ADR explicitly addresses the structural change (not merely a tangential README update)."
  - description: "Cycle-end distillation trigger (PRD-0004). When a PR introduces *distillation-worthy work* — a new or modified ADR (docs/adr/ADR-*), a new or modified OPP (docs/opportunities/OPP-*), a new or modified module manifest (anywhere under platform/ — profiles/, agents/, or core/kernel/), or a change to the active-module catalog (harness.manifest.yaml) — the same PR must include an entry in at least one knowledge destination: docs/knowledge/shared-observations.md or docs/operating-principles.md. Inverse of the existing audit-trail rules: those fire on destination *touches* and require an audit trail of the touch; this rule fires on distillation-worthy *work* and requires the destination to be touched. Both can fire on the same PR; each satisfies its own concern. The trigger set is deliberately heavy so the rule does not fire on routine work (Dependabot bumps, typo fixes, etc.); the change-class boundaries match the substantive-decision boundaries operating-principles § 2 already enforces. See platform/workflow/cycle-end-distillation.md for the decision tree on which destination to use. v1.2.0 (ADR-0014) shrank the satisfier set from three to two: docs/knowledge/distilled-learnings.md was sunset because it was a declared destination with no inbound flow."
    triggerPaths:
      - "^docs/adr/ADR-"
      - "^docs/opportunities/OPP-"
      - "^platform/.+/module\\.yaml$"
      - "^harness\\.manifest\\.yaml$"
    requiredAny:
      - "^docs/knowledge/shared-observations\\.md$"
      - "^docs/operating-principles\\.md$"
    humanReview: "Reviewers verify the distillation entry captures the learning *from* the trigger work (the ADR's rejected alternatives or generalizable principle, the OPP's evidence pattern or discovery technique, the module's reusable insight, the catalog change's architectural rationale) rather than an unrelated observation appended to satisfy the rule. Cargo-cult observations degrade signal worse than missed observations; reviewers push back on entries that don't substantively connect to the trigger work. See platform/workflow/cycle-end-distillation.md for the satisfier decision tree."
validators:
  - validate-required-artifacts
  - validate-companions
reviewGates:
  - "The foundational Observation Structure choice is a one-way decision in practice. Reviewers treat ADRs changing it with extra scrutiny."
  - "Distilled learnings should cite the observations that produced them. Unsourced assertions are not institutional knowledge — they're opinions."
  - "Write Policy changes are adjustable but should be accompanied by a rationale for why the signal/noise balance needs adjusting."
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/profiles/management/knowledge-capture/README.md
