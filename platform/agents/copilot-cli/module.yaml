id: copilot-cli
type: agent
version: 0.1.0
summary: GitHub Copilot CLI operating pack. Manages multi-instruction-file precedence (AGENTS.md, .github/copilot-instructions.md, .github/instructions/) to prevent non-deterministic conflict resolution.

dependsOn:
  - kernel/base
  - base

conflictsWith: []

requiredArtifacts: []

optionalArtifacts:
  - .github/copilot-instructions.md

sensitivePaths:
  - description: Copilot CLI instruction surfaces — overlap with AGENTS.md is non-deterministic and must be managed
    patterns:
      - ^\.github/copilot-instructions\.md$
      - ^\.github/instructions/
      - ^\.github/copilot/agents/

companionRules:
  - description: Copilot CLI instruction changes require AGENTS.md cross-reference or an ADR
    triggerPaths:
      - ^\.github/copilot-instructions\.md$
      - ^\.github/instructions/
      - ^\.github/copilot/agents/
    requiredAny:
      - ^AGENTS\.md$
      - ^docs/adr/ADR-
      - ^docs/requirements/PRD-
    humanReview: Reviewers verify that Copilot-specific instructions do not silently override AGENTS.md and that conflict surfaces are minimized.

validators:
  - validate-agent-pack
  - validate-companions

reviewGates:
  - Copilot CLI instruction files must not contradict AGENTS.md — when both exist, Copilot's resolution is non-deterministic.
  - Custom Copilot CLI agents under .github/copilot/agents/ must declare their default tool access and tier scope.

agentAdapters:
  - AGENTS.md
  - .github/copilot-instructions.md

compiledFragments:
  - platform/agents/copilot-cli/README.md

recommendedSkills:
  - harness-governance
