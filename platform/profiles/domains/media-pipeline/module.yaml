id: media-pipeline
type: domain
version: 1.0.0
stability: beta
summary: Media and photogrammetry domain overlay for derived artifacts, storage workflows, and operational traceability.
dependsOn:
  - kernel/base
  - object-storage
conflictsWith: []
requiredArtifacts: []
optionalArtifacts:
  - docs/architecture/overview.md
  - docs/ops/runbook-index.md
sensitivePaths:
  - description: Media ingest, transform, and derived artifact workflows
    patterns:
      - ^media/
      - ^pipelines/
      - ^transforms/
      - ^photogrammetry/
companionRules:
  - description: Media workflow changes require architecture or runbook updates
    triggerPaths:
      - ^media/
      - ^pipelines/
      - ^transforms/
      - ^photogrammetry/
    requiredAny:
      - ^docs/architecture/overview\.md$
      - ^docs/ops/runbook-index\.md$
    humanReview: Reviewers verify operational replayability, storage impact, and quality expectations.
validators:
  - validate-companions
reviewGates:
  - Human review is required when workflows affect expensive recomputation or irreversible media handling.
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/profiles/domains/media-pipeline/README.md
recommendedSkills:
  # --- Agent Skills format (SKILL.md directories) ---
  - harness-governance   # trust tiers and companion rules (source: platform/skills/)

  # --- OpenClaw / ClawHub ecosystem (clawhub install <slug>) ---
  - ffmpeg-master   # video and audio processing — format conversion or transcoding (curated list)
  - mediaproc       # process media files in a locked-down SSH container (curated list)
