id: gemini-cli
type: agent
version: 0.1.0
summary: Gemini CLI operating pack. Translates GEMINI.md hierarchical context loading and approval-mode semantics into harness trust tiers.

dependsOn:
  - kernel/base
  - base

conflictsWith: []

requiredArtifacts:
  - GEMINI.md

optionalArtifacts:
  - .gemini/settings.json

sensitivePaths:
  - description: Gemini CLI shim and settings — changes must remain aligned with AGENTS.md
    patterns:
      - ^GEMINI\.md$
      - ^\.gemini/

companionRules:
  - description: Gemini CLI shim or settings changes require AGENTS.md cross-reference or an ADR
    triggerPaths:
      - ^GEMINI\.md$
      - ^\.gemini/
    requiredAny:
      - ^AGENTS\.md$
      - ^docs/adr/ADR-
      - ^docs/requirements/PRD-
    humanReview: Reviewers verify approval-mode policy and sandbox posture still honor kernel trust tiers.

validators:
  - validate-agent-pack
  - validate-companions

reviewGates:
  - GEMINI.md must defer to AGENTS.md for trust-tier rules and stop conditions.
  - --yolo / approval-mode=yolo is prohibited outside the official Gemini CLI sandbox image.

agentAdapters:
  - GEMINI.md
  - .gemini/settings.json

compiledFragments:
  - platform/agents/gemini-cli/README.md

recommendedSkills:
  - harness-governance
