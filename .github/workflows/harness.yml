name: Harness Self-Governance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validators:
    name: Validators
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install ripgrep (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y ripgrep

      - name: Install ripgrep (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ripgrep

      - name: Validate manifest structure
        run: bash platform/validators/validate-manifest.sh harness.manifest.yaml

      - name: Validate module graph
        run: bash platform/validators/validate-module-graph.sh harness.manifest.yaml

      - name: Validate required artifacts
        run: bash platform/validators/validate-required-artifacts.sh harness.manifest.yaml .

      - name: Validate placeholders
        run: bash platform/validators/validate-placeholders.sh .

      - name: Validate agent pack
        run: bash platform/validators/validate-agent-pack.sh harness.manifest.yaml .

      - name: Validate doc references
        run: bash platform/validators/validate-doc-references.sh .

      - name: Validate companion rules
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          bash platform/validators/validate-companions.sh \
            harness.manifest.yaml . "$BASE_REF"

  tests:
    name: Self-Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install ripgrep (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y ripgrep

      - name: Install ripgrep (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ripgrep

      - name: Unit tests (registry logic)
        run: |
          ruby -I platform/validators/lib \
               platform/validators/test/test_harness_registry.rb

      - name: Integration tests (validator scripts)
        run: |
          ruby -I platform/validators/lib \
               platform/validators/test/test_validators_integration.rb

  bootstrap-tests:
    name: Bootstrap Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      # install.sh requires Bash 4+ (uses `declare -A`). macOS runners ship
      # Bash 3.2 as /bin/bash; install a modern bash via Homebrew so the
      # subsequent `bash install.sh` invocation in the tests resolves to it
      # via PATH (Homebrew bin dir precedes /bin on the runner image).
      - name: Install Bash 4+ (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bash

      - name: Run install.sh integration tests
        run: ruby platform/bootstrap/test/test_install.rb

      - name: Run link-skills.sh integration tests
        run: ruby platform/bootstrap/test/test_link_skills.rb

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      # Threshold: warning. Blocks on errors + warnings; info/style findings
      # surface in logs without blocking. Tighten to --severity=info in a
      # follow-up PR after the info-level SC2012 (ls in error message) is
      # either fixed or explicitly suppressed.
      - name: Run shellcheck (warning threshold)
        run: |
          shellcheck --severity=warning \
            platform/bootstrap/*.sh \
            platform/validators/*.sh

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      # Config lives at .markdownlint-cli2.jsonc at repo root. Rule
      # rationale (which rules are enabled / disabled and why) is in
      # ADR-0011. Blocks on errors only; the config tunes which rule
      # families produce errors vs warnings.
      - name: Run markdownlint-cli2
        run: markdownlint-cli2
