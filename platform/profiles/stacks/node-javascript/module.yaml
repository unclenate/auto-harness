id: node-javascript
type: stack
version: 1.0.0
summary: Node.js (plain JavaScript) overlay for projects without TypeScript — pre-TypeScript-era codebases, Bun/Deno projects that decline TS, projects that have chosen ESM-only plain-JS.
dependsOn:
  - kernel/base
conflictsWith: []
requiredArtifacts: []
optionalArtifacts:
  - .nvmrc
  - package.json
  - .github/workflows/stack.yml
sensitivePaths:
  - description: Node runtime or dependency configuration
    patterns:
      - ^package\.json$
      - ^package-lock\.json$
      - ^pnpm-lock\.yaml$
      - ^yarn\.lock$
      - ^\.nvmrc$
companionRules:
  - description: Major dependency or runtime changes require architecture or decision context
    triggerPaths:
      - ^package\.json$
      - ^package-lock\.json$
      - ^pnpm-lock\.yaml$
      - ^yarn\.lock$
      - ^\.nvmrc$
    requiredAny:
      - ^docs/adr/ADR-
      - ^docs/architecture/overview\.md$
      - ^docs/requirements/PRD-
    humanReview: Reviewers verify that supply-chain and runtime impacts are explained, not just recorded.
validators:
  - validate-module-graph
  - validate-companions
reviewGates:
  - Dependency installation remains a Tier 4 action and must be human-directed.
agentAdapters:
  - platform/agents/claude-code
compiledFragments:
  - platform/profiles/stacks/node-javascript/README.md
recommendedSkills:
  - harness-governance
