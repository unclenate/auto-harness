id: claude-code
type: agent
version: 1.0.0
summary: Claude Code operating pack for startup sequence, scope control, permission adapters, and compatibility entrypoints.
dependsOn:
  - kernel/base
  - base
conflictsWith: []
requiredArtifacts:
  - CLAUDE.md
  - .claude/settings.json
optionalArtifacts:
  - .claude/hooks/log-command.sh
sensitivePaths:
  - description: Claude adapter and permissions
    patterns:
      - ^CLAUDE\.md$
      - ^\.claude/
companionRules:
  - description: Claude adapter changes require base agent or kernel review context
    triggerPaths:
      - ^CLAUDE\.md$
      - ^\.claude/
    requiredAny:
      - ^AGENTS\.md$
      - ^docs/adr/ADR-
    humanReview: Reviewers verify that tool-specific permissions still honor kernel trust boundaries.
validators:
  - validate-agent-pack
  - validate-companions
reviewGates:
  - Tool-specific allowlists must not bypass kernel tier policy.
agentAdapters:
  - CLAUDE.md
  - .claude/settings.json
compiledFragments:
  - platform/agents/claude-code/README.md
recommendedSkills:
  # --- Agent Skills format (SKILL.md directories) ---
  # Install to .agents/skills/ or .claude/skills/; source: platform/skills/
  - harness-governance   # always — trust tiers, companion rules, lifecycle controls
  # Add harness-web3 for Web3 projects (source: platform/skills/)

  # --- OpenClaw / ClawHub ecosystem (clawhub install <slug>) ---
  # Core (most projects — curated list):
  #   next-best-practices, next-cache-components  — Next.js projects
  #   lb-vercel-skill                             — Vercel delivery
  #   supabase                                    — Supabase data layer
  # Web3: see domains/web3/module.yaml — run azhua-skill-vetter first
  # Full mapping: platform/workflow/skills-and-agents.md
