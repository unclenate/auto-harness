# NOTE: This is an auto-harness sample-project file (reference implementation).
# If you copy this file into your own project, replace the SPDX/copyright
# header below with your own — running
# `bash .harness/platform/bootstrap/set-consumer-headers.sh` from your project root
# after the copy will do this for you.
#
# Copyright [[YEAR]] [[OWNER_NAME]] <[[OWNER_EMAIL]]>
# SPDX-License-Identifier: [[SPDX_LICENSE]]
#
# auto-harness validator chain for consumer projects.
# Copy to .github/workflows/harness.yml in your project root.
#
# This workflow runs the harness validator chain on every PR and push to
# main, gating merges when validators surface drift.
#
# Prerequisites:
#   - auto-harness mounted as a git submodule at .harness/ (or copied
#     to platform/; adjust the validator paths below if so)
#   - harness.manifest.yaml at the consumer-project root
#   - Ruby 3.0+ and ripgrep available on the runner
#
# Spec: platform/workflow/ci-integration.md in the auto-harness submodule.

name: Harness Validators

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validators:
    name: Validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Submodule checkout — harness lives in .harness/
          submodules: recursive
          # Companion-rule validator needs full history to diff against base
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate manifest structure
        run: bash .harness/platform/validators/validate-manifest.sh harness.manifest.yaml

      - name: Validate module graph
        run: bash .harness/platform/validators/validate-module-graph.sh harness.manifest.yaml

      - name: Validate required artifacts
        run: bash .harness/platform/validators/validate-required-artifacts.sh harness.manifest.yaml .

      - name: Validate placeholders
        run: bash .harness/platform/validators/validate-placeholders.sh .

      - name: Validate agent pack
        run: bash .harness/platform/validators/validate-agent-pack.sh harness.manifest.yaml .

      - name: Validate doc references
        run: bash .harness/platform/validators/validate-doc-references.sh .

      - name: Validate trust tier
        run: bash .harness/platform/validators/validate-trust-tier.sh harness.manifest.yaml .

      - name: Validate sensitive paths
        run: bash .harness/platform/validators/validate-sensitive-paths.sh harness.manifest.yaml .

      - name: Validate skill content
        # BLOCK posture: surfaces prompt-injection / tier-bypass patterns
        # in active modules' authored prose (description, summary, SKILL.md,
        # compiledFragments). Hard-fails on any unexempted hit.
        run: bash .harness/platform/validators/validate-skill-content.sh harness.manifest.yaml .

      - name: Validate knowledge redaction
        # WARN posture: surfaces consumer-name hits in new knowledge-file
        # lines but does not fail the PR. Reviewers eyeball warnings.
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash .harness/platform/validators/validate-knowledge-redaction.sh . "$BASE_REF"

      - name: Validate SAST coverage
        # Opt-in: when management/security-static-analysis is not active in
        # the manifest, the validator exits 0 with a "module inactive" message.
        # When active, validates docs/security/sast-coverage.md (tool,
        # scanPaths, severityThreshold). Half-enforces sweep §11.
        run: bash .harness/platform/validators/validate-sast-coverage.sh harness.manifest.yaml .

      - name: Validate privacy-by-design
        # Opt-in: when management/privacy-by-design is not active in the
        # manifest, the validator exits 0 with a "module inactive" message.
        # When active, validates privacy-profile.md existence and
        # well-formedness, checks consistency against data-inventory.md, and
        # surfaces advisory WARN hits for privacy-risk indicators.
        # Half-enforces sweep §11.
        run: bash .harness/platform/validators/validate-privacy-by-design.sh harness.manifest.yaml .

      - name: Validate companion rules
        # PR-diff-based; only meaningful on pull_request events.
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          bash .harness/platform/validators/validate-companions.sh \
            harness.manifest.yaml . "$BASE_REF"

  submodule-smoke-test:
    name: Submodule Smoke Test
    # Consumer-side integration smoke test (OPP-0025). Catches the two silent
    # submodule-integration failure modes the harness's own CI cannot see by
    # construction (it IS the upstream, so it has no consumer-side clone):
    #   1. a fresh clone without --recurse-submodules leaves .harness/ empty;
    #   2. the pinned submodule SHA is no longer reachable upstream (force-push,
    #      deleted branch, archived/auth-gated remote) — the checkout itself fails.
    # Runs on a clean runner, so no developer-machine hidden state can mask the
    # defect. Kept a SEPARATE job (not a step in `validators`) so a failure here
    # reads as "submodule integration is broken", distinct from "a validator
    # found drift" — and so it runs with clean-checkout semantics.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules (fresh-clone semantics)
        # If the pinned harness SHA is unreachable upstream, this step fails
        # with `fatal: reference is not a tree` — exactly the consumer-side
        # break we want surfaced on every PR rather than in a teammate's clone.
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Assert the harness submodule materialized
        run: |
          if [ ! -f .harness/platform/validators/validate-manifest.sh ]; then
            echo "✗ .harness submodule did not materialize."
            echo "  → clone with 'git clone --recurse-submodules', or run"
            echo "    'git submodule update --init --recursive', and confirm the"
            echo "    pinned SHA is reachable in the harness remote."
            exit 1
          fi
          echo "✓ .harness submodule materialized."

      - name: Smoke-run one validator against the consumer manifest
        # Proves the integration is live end-to-end: the materialized submodule
        # can actually run a validator against this project's manifest.
        run: bash .harness/platform/validators/validate-manifest.sh harness.manifest.yaml
