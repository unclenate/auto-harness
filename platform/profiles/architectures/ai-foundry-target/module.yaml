id: ai-foundry-target
type: architecture
version: 1.0.0
stability: beta
summary: Enterprise AI foundry-target overlay — declares which foundries (Microsoft/Azure AI Foundry, NVIDIA, Palantir AIP, AWS Bedrock AgentCore, Google Vertex Agent Engine, custom) a project commits to landing in, and the portable foundry-agnostic evidence (OpenTelemetry GenAI trace conformance, a portable eval suite, an open-protocol routing/MCP/A2A seam) that substantiates each. Opt-in; v1 is declarative (no enforcement); PRD-0028 / OPP-0028.
dependsOn:
  - kernel/base
conflictsWith: []
requiredArtifacts:
  - docs/architecture/foundry-targets.md
  - docs/observability/trace-contract.md
optionalArtifacts:
  - docs/architecture/model-routing.md
sensitivePaths: []
companionRules: []
validators:
  - validate-required-artifacts
  - validate-companions
reviewGates:
  - Human review confirms each declared foundry uses its current vendor identifier from the template enum (or the explicit `custom` hatch), that the live-vs-roadmap status per foundry is honest, and that the three portable evidence axes (OpenTelemetry GenAI trace conformance, a portable eval suite, an open-protocol model-routing/MCP/A2A seam) are substantiated rather than aspirational.
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/profiles/architectures/ai-foundry-target/README.md
