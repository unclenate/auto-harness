# SPDX-License-Identifier: [[SPDX_LICENSE]]
#
# auto-harness validator chain for consumer projects on GitLab CI.
# Copy to .gitlab-ci.yml in your project root.
#
# Prerequisites:
#   - auto-harness mounted as a git submodule at .harness/
#   - harness.manifest.yaml at the consumer-project root
#   - Ruby 3.0+ and ripgrep available
#
# Spec: platform/workflow/ci-integration.md in the auto-harness submodule.

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_DEPTH: 0

stages:
  - validate

# Consumer-side integration smoke test (OPP-0025). Catches the two silent
# submodule-integration failure modes the harness's own CI cannot see:
#   1. a fresh clone without recursive submodules leaves .harness/ empty;
#   2. the pinned submodule SHA is no longer reachable upstream (force-push,
#      deleted branch, archived/auth-gated remote) — the clone itself fails.
# Kept a SEPARATE job so a failure here reads as "submodule integration is
# broken", distinct from "a validator found drift". GIT_SUBMODULE_STRATEGY is
# recursive (set globally above), so the runner clones the submodule fresh.
submodule-smoke-test:
  stage: validate
  image: ruby:3.3
  script:
    - |
      if [ ! -f .harness/platform/validators/validate-manifest.sh ]; then
        echo "✗ .harness submodule did not materialize."
        echo "  → ensure GIT_SUBMODULE_STRATEGY: recursive, and confirm the"
        echo "    pinned SHA is reachable in the harness remote."
        exit 1
      fi
      echo "✓ .harness submodule materialized."
    # Proves the integration is live: the materialized submodule runs a validator.
    - bash .harness/platform/validators/validate-manifest.sh harness.manifest.yaml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

validate:
  stage: validate
  image: ruby:3.3
  before_script:
    - apt-get update -qq && apt-get install -y ripgrep
  script:
    - bash .harness/platform/validators/validate-manifest.sh harness.manifest.yaml
    - bash .harness/platform/validators/validate-module-graph.sh harness.manifest.yaml
    - bash .harness/platform/validators/validate-required-artifacts.sh harness.manifest.yaml .
    - bash .harness/platform/validators/validate-placeholders.sh .
    - bash .harness/platform/validators/validate-agent-pack.sh harness.manifest.yaml .
    - bash .harness/platform/validators/validate-doc-references.sh .
    - bash .harness/platform/validators/validate-trust-tier.sh harness.manifest.yaml .
    - bash .harness/platform/validators/validate-sensitive-paths.sh harness.manifest.yaml .
    - bash .harness/platform/validators/validate-skill-content.sh harness.manifest.yaml .
    - bash .harness/platform/validators/validate-knowledge-redaction.sh . "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - bash .harness/platform/validators/validate-sast-coverage.sh harness.manifest.yaml .
    - bash .harness/platform/validators/validate-privacy-by-design.sh harness.manifest.yaml .
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        bash .harness/platform/validators/validate-companions.sh \
          harness.manifest.yaml . "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
      else
        echo "Skipping companion validation (not an MR event)."
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
