id: kernel/base
type: core
version: 1.0.0
summary: Universal governance kernel for lifecycle controls, auditability, record discipline, and operational readiness.
tier:
  declared: 5
  rationale: "Governs CI workflows (^.github/workflows/), automation scripts (^scripts/), and governance entrypoints. While the kernel's own content is read-only doctrine (effectively tier 0 for inspection), the highest tier of work it governs is 5 (production-shape paths per PRD-0006 FR-002). The declared tier reflects the governance ceiling, not the doctrine surface — see ADR-0017 Wave 5.1 implementation notes."
dependsOn: []
conflictsWith: []
requiredArtifacts:
  - HARNESS.md
  - AGENTS.md
  - docs/operating-principles.md
optionalArtifacts:
  - docs/architecture/overview.md
  - docs/ops/ownership-map.md
sensitivePaths:
  - description: Governance entrypoints
    patterns:
      - ^HARNESS\.md$
      - ^AGENTS\.md$
      - ^CLAUDE\.md$
      - ^\.github/CODEOWNERS$
  - description: Governance automation
    patterns:
      - ^\.github/workflows/
      - ^scripts/
companionRules:
  - description: Governance changes require governance rationale or operating-model update
    triggerPaths:
      - ^HARNESS\.md$
      - ^AGENTS\.md$
      - ^CLAUDE\.md$
      - ^\.github/CODEOWNERS$
      - ^\.github/workflows/
      - ^scripts/
    requiredAny:
      - ^docs/adr/ADR-
      - ^docs/operating-principles\.md$
      - ^docs/requirements/PRD-
      - ^docs/project/change-log\.md$
      - ^docs/project/dependency-log\.md$
    humanReview: |
      Reviewers must verify that governance changes are intentional and not merely
      mechanical. Substantive decisions (new authentication model, new CI surface,
      new ownership boundary) require ADR / PRD / operating-principles. Routine
      maintenance (Dependabot version bumps, CODEOWNERS line additions for new
      maintainers, minor workflow ergonomics) may satisfy via change-log or
      dependency-log entry that names the change and the reviewer.
validators:
  - validate-manifest
  - validate-module-graph
  - validate-placeholders
  - validate-companions
  - validate-catalog-counts
  - validate-trust-tier
reviewGates:
  - Human review is mandatory for governance entrypoint changes.
  - Validator success never replaces ownership review for protected governance files.
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/core/kernel/base/doctrine.md
  - platform/core/kernel/base/trust-model.md
  - platform/core/kernel/base/lifecycle-controls.md
  - platform/core/kernel/base/canonical-records.md
  - platform/core/kernel/base/enforcement-model.md
  - platform/core/kernel/base/audit-model.md
  - platform/core/kernel/base/ops-readiness.md
recommendedSkills:
  # Agent Skills format (SKILL.md directory). Install to .agents/skills/ or .claude/skills/
  - harness-governance   # platform/skills/harness-governance — trust tiers, companion rules, lifecycle
