<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 737" font-family="Inter, 'Segoe UI', Roboto, -apple-system, system-ui, sans-serif" role="img" aria-labelledby="ttl-title ttl-desc">
  <title id="ttl-title">auto-harness Trust Tier Model</title>
  <desc id="ttl-desc">Six tiers from read-only to production. Tiers 0 (read-only), 1 (local analysis), 2 (workspace mutation, the default agent scope) and 3 (git-writing) carry no gate. Tier 4 (environment-altering) requires human direction. Tier 5 (remote / production) requires human direction plus a second sign-off. Agents may operate below their declared tier but may never self-elevate.</desc>

  <rect width="760" height="737" rx="24" fill="#0B101C"/>

  <text x="44" y="84" font-size="30" font-weight="700" fill="#F3F6FB">Trust Tier Model</text>
  <text x="44" y="113" font-size="15" fill="#9AA5B8">Six tiers from read-only to production — what an AI agent may do,</text>
  <text x="44" y="132" font-size="15" fill="#9AA5B8">and when a human must sign off.</text>

  <!-- Tier 5 -->
  <rect x="44" y="158" width="672" height="76" rx="14" fill="#18202E"/>
  <rect x="62" y="174" width="6" height="44" rx="3" fill="#DC2626"/>
  <rect x="86" y="174" width="44" height="44" rx="10" fill="#DC2626"/>
  <text x="108" y="203" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">5</text>
  <text x="148" y="191" font-size="17" font-weight="600" fill="#F3F6FB">Remote / production</text>
  <text x="148" y="212" font-size="13" fill="#9AA5B8">Deploy · production migrations · secrets rotation</text>
  <rect x="468" y="181" width="232" height="30" rx="15" fill="#DC2626"/>
  <text x="584" y="201" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Human direction + 2nd sign-off</text>

  <!-- Tier 4 -->
  <rect x="44" y="244" width="672" height="76" rx="14" fill="#18202E"/>
  <rect x="62" y="260" width="6" height="44" rx="3" fill="#D97706"/>
  <rect x="86" y="260" width="44" height="44" rx="10" fill="#D97706"/>
  <text x="108" y="289" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">4</text>
  <text x="148" y="277" font-size="17" font-weight="600" fill="#F3F6FB">Environment-altering</text>
  <text x="148" y="298" font-size="13" fill="#9AA5B8">Run migrations · install deps · change env vars</text>
  <rect x="512" y="267" width="188" height="30" rx="15" fill="#D97706"/>
  <text x="606" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Human direction required</text>

  <!-- Tier 3 -->
  <rect x="44" y="330" width="672" height="76" rx="14" fill="#18202E"/>
  <rect x="62" y="346" width="6" height="44" rx="3" fill="#3B82F6"/>
  <rect x="86" y="346" width="44" height="44" rx="10" fill="#3B82F6"/>
  <text x="108" y="375" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">3</text>
  <text x="148" y="363" font-size="17" font-weight="600" fill="#F3F6FB">Git-writing</text>
  <text x="148" y="384" font-size="13" fill="#9AA5B8">Commit · push to feature branches</text>
  <rect x="622" y="353" width="78" height="30" rx="15" fill="#232E40"/>
  <text x="661" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#9AA5B8">No gate</text>

  <!-- Tier 2 -->
  <rect x="44" y="416" width="672" height="76" rx="14" fill="#18202E"/>
  <rect x="62" y="432" width="6" height="44" rx="3" fill="#3B82F6"/>
  <rect x="86" y="432" width="44" height="44" rx="10" fill="#3B82F6"/>
  <text x="108" y="461" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">2</text>
  <text x="148" y="449" font-size="17" font-weight="600" fill="#F3F6FB">Workspace mutation</text>
  <text x="148" y="470" font-size="13" fill="#9AA5B8">Edit files · create artifacts · scaffold docs</text>
  <rect x="480" y="439" width="220" height="30" rx="15" fill="#232E40"/>
  <text x="590" y="459" text-anchor="middle" font-size="12" font-weight="600" fill="#9AA5B8">No gate · default agent scope</text>

  <!-- Tier 1 -->
  <rect x="44" y="502" width="672" height="76" rx="14" fill="#18202E"/>
  <rect x="62" y="518" width="6" height="44" rx="3" fill="#22B167"/>
  <rect x="86" y="518" width="44" height="44" rx="10" fill="#22B167"/>
  <text x="108" y="547" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">1</text>
  <text x="148" y="535" font-size="17" font-weight="600" fill="#F3F6FB">Local analysis</text>
  <text x="148" y="556" font-size="13" fill="#9AA5B8">Run tests · builds · linters</text>
  <rect x="622" y="525" width="78" height="30" rx="15" fill="#232E40"/>
  <text x="661" y="545" text-anchor="middle" font-size="12" font-weight="600" fill="#9AA5B8">No gate</text>

  <!-- Tier 0 -->
  <rect x="44" y="588" width="672" height="76" rx="14" fill="#18202E"/>
  <rect x="62" y="604" width="6" height="44" rx="3" fill="#22B167"/>
  <rect x="86" y="604" width="44" height="44" rx="10" fill="#22B167"/>
  <text x="108" y="633" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">0</text>
  <text x="148" y="621" font-size="17" font-weight="600" fill="#F3F6FB">Read-only</text>
  <text x="148" y="642" font-size="13" fill="#9AA5B8">Read files · search · inspect git history</text>
  <rect x="622" y="611" width="78" height="30" rx="15" fill="#232E40"/>
  <text x="661" y="631" text-anchor="middle" font-size="12" font-weight="600" fill="#9AA5B8">No gate</text>

  <text x="44" y="706" font-size="12" fill="#9AA5B8">Agents may always operate at a lower tier than their adapter declares. They may never self-elevate.</text>
</svg>
